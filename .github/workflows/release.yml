name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Strip always-auth from .npmrc (set by setup-node, deprecated in npm 11)
      - run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build

      - name: Extract version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Sync in-repo version files to match the tag (package.json drives the rest).
      - name: Sync version files to $VERSION
        run: |
          node -e "
            const fs = require('fs');
            for (const f of ['manifest.json', 'server.json', '.claude-plugin/plugin.json', '.claude-plugin/marketplace.json']) {
              const o = JSON.parse(fs.readFileSync(f, 'utf8'));
              if (o.version !== undefined) o.version = '$VERSION';
              if (o.metadata?.version !== undefined) o.metadata.version = '$VERSION';
              if (Array.isArray(o.packages)) o.packages.forEach(p => { if (p.version !== undefined) p.version = '$VERSION'; });
              if (Array.isArray(o.plugins)) o.plugins.forEach(p => { if (p.version !== undefined) p.version = '$VERSION'; });
              fs.writeFileSync(f, JSON.stringify(o, null, 2) + '\n');
            }
          "

      # Package the .skill file
      - name: Package skill
        run: |
          python3 - <<'EOF'
          import zipfile, pathlib, os

          version = os.environ["VERSION"]
          skill_name = "resy-mcp"
          out = pathlib.Path(f"{skill_name}-{version}.skill")

          with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
              zf.write(pathlib.Path("SKILL.md"), f"{skill_name}/SKILL.md")

          print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      - name: Build .mcpb bundle
        run: |
          npx @anthropic-ai/mcpb pack
          mv resy-mcp.mcpb "resy-mcp-${VERSION}.mcpb"

      - name: Publish to npm
        run: npm publish --access public --provenance

      # ─── modelcontextprotocol/registry (auto-ingested by PulseMCP weekly) ───
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

      # ─── ClawHub (OpenClaw skill registry) — optional, runs only if CLAWHUB_TOKEN is set ───
      # Secrets can't be referenced directly in `if:` expressions, so we promote
      # the token to an env var first and gate on whether it resolved.
      - name: Publish skill to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set — skipping ClawHub publish."
            exit 0
          fi
          npx --yes clawhub login --token "$CLAWHUB_TOKEN"
          npx --yes clawhub publish . --version "${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            resy-mcp-${{ env.VERSION }}.skill
            resy-mcp-${{ env.VERSION }}.mcpb
          generate_release_notes: true
